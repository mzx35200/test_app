name: my-app-stack

services:
  app:
    image: testapp:v1
    container_name: app
    env_file: "config.env"
    ports:
      - "8080:8080"
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
      PGDB: ${PGDB}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:latest
    container_name: pg
    command: postgres -c 'max_connections=1500'
    env_file: "config.env"
    environment:
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDB}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d wallet"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
